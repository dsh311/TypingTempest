<![CDATA[
PROBLEM:
Climbing Stairs

You are climbing a staircase that has n steps. You can either take one step or two steps at a time.
Your task is to determine the number of distinct ways you can reach the top of the staircase.

Input: n = 5
Output: 8
Explanation:
There are 8 ways to climb 5 stairs:

1.  1-1-1-1-1
2.  1-1-1-2
3.  1-1-2-1
4.  1-2-1-1
5.  2-1-1-1
6.  1-2-2
7.  2-1-2
8.  2-2-1


Approach:
This problem follows the Fibonacci sequence because to reach step n, you could have either:

1. Taken a single step from step (n-1)
2. Taken a two-step jump from step (n-2)

This problem can be solved using recursion, dynamic programming (DP),
or an iterative approach with constant space.

]]>
		</p>
	</section>

	<section type="code">
		<code language="csharp" >
<![CDATA[
using System;

public class ClimbingStairs
{
    public int ClimbStairs(int n)
    {
        if (n <= 1)
            return 1;

        int[] dp = new int[n + 1];  // Array to store the number of ways to reach each step
        dp[0] = 1;  // Base case: There's 1 way to stay on the ground (0th step)
        dp[1] = 1;  // Base case: There's 1 way to reach the first step

        // Fill the dp array
        for (int i = 2; i <= n; i++)
        {
            dp[i] = dp[i - 1] + dp[i - 2];
        }

        return dp[n];  // The result is the number of ways to reach the nth step
    }
}

ClimbingStairs cs = new ClimbingStairs();

int n = 5; // Example input
int result = cs.ClimbStairs(n);

Console.WriteLine($"Number of distinct ways to climb {n} stairs: {result}");
