<![CDATA[
PROBLEM:
Detect if a singly linked list has a cycle.

CLUE:
Efficient Strategy: Floyd's Cycle Detection Algorithm (Tortoise and Hare)
The best way to detect a cycle in a singly linked list is to use Floyd's Cycle Detection Algorithm,
which uses two pointers:

1. Slow Pointer (slow) moves one step at a time.
2. Fast Pointer (fast) moves two steps at a time.
3. If there is a cycle, fast and slow will eventually meet inside the cycle.
4. If there is no cycle, fast will reach the end (null).

* The slow starts at the head and the fast starts at head.next.
* Loop while (fast != null  fast.next != null)


]]>
		</p>
	</section>

	<section type="code">
		<code language="csharp" >
<![CDATA[
public class ListNode
{
    public int val;
    public ListNode next;
    public ListNode(int x) { val = x; next = null; }
}

public class LinkedListCycleDetection
{
    public bool HasCycle(ListNode head)
    {
        if (head == null || head.next == null)
        {
            return false;
        }

        ListNode slow = head;
        ListNode fast = head.next;

        while (fast != null  fast.next != null)
        {
            if (slow == fast)
            {
                return true; // Cycle detected
            }
            
            slow = slow.next;       // Move slow pointer by 1 step
            fast = fast.next.next;  // Move fast pointer by 2 steps
        }

        return false; // No cycle detected
    }
}

// Create a linked list with a cycle: 1 - 2 - 3 - 4 - 5 - 3 (cycle)
ListNode head = new ListNode(1);
head.next = new ListNode(2);
head.next.next = new ListNode(3);
head.next.next.next = new ListNode(4);
head.next.next.next.next = new ListNode(5);
head.next.next.next.next.next = head.next.next; // Creates a cycle at node 3

LinkedListCycleDetection detection = new LinkedListCycleDetection();
bool hasCycle = detection.HasCycle(head);

Console.WriteLine(hasCycle); // Output: True

]]>
